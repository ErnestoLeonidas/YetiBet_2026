<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ranking · YetiBet 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="app.css" rel="stylesheet">
</head>
<body>

<nav class="yeti-nav">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
    <a class="brand" href="index.html">YETIBET <span class="y26">2026</span></a>
    <div class="d-flex gap-3">
      <a class="nav-link" href="index.html">Inicio</a>
      <a class="nav-link active" href="ranking.html">Ranking</a>
      <a class="nav-link" href="cartillas.html">Cartillas</a>
      <a class="nav-link" href="resultados.html">Resultados</a>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h1 class="fs-2 mb-1">🏆 Ranking de la polla</h1>
  <p class="text-secondary mb-4">3 puntos por acierto 1X2 · solo cuentan partidos finalizados.</p>

  <div class="card-yeti p-0 overflow-hidden">
    <table class="table mb-0 pizarra align-middle">
      <thead>
        <tr>
          <th class="ps-3">#</th>
          <th>Participante</th>
          <th class="text-center">Aciertos</th>
          <th class="text-center d-none d-sm-table-cell">Jugados</th>
          <th class="text-center d-none d-sm-table-cell">Efectividad</th>
          <th class="text-center pe-3">Puntos</th>
        </tr>
      </thead>
      <tbody id="cuerpo">
        <tr><td colspan="6" class="text-center text-secondary py-4">Cargando…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<footer class="pie container">YetiBet 2026<br>
  <a class="forjado" href="https://github.com/TU_USUARIO_GITHUB" target="_blank" rel="noopener">
    🪽🩸🪽 Forjado en Baal | Ernesto Velasquez
  </a>
</footer>

<script src="app.js"></script>
<script>
(async () => {
  const cuerpo = document.getElementById('cuerpo');
  try {
    const datos = await cargarDatos();
    const ranking = calcularRanking(datos);

    if (!ranking.length) {
      cuerpo.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">Aún no hay cartillas cargadas. Sube la tuya en el Sheet 📤</td></tr>';
      return;
    }

    const medallas = ['🥇', '🥈', '🥉'];
    const clases   = ['oro', 'plata', 'bronce'];

    cuerpo.innerHTML = ranking.map((r, i) => `
      <tr class="${clases[i] || ''}">
        <td class="ps-3 num fw-bold">${i + 1}</td>
        <td>
          ${medallas[i] ? `<span class="medalla me-1">${medallas[i]}</span>` : ''}
          <b>${r.nombre}</b>
        </td>
        <td class="text-center num">${r.aciertos}</td>
        <td class="text-center num d-none d-sm-table-cell">${r.evaluados}</td>
        <td class="text-center num d-none d-sm-table-cell">${r.efectividad}%</td>
        <td class="text-center pe-3"><span class="pts num">${r.puntos}</span></td>
      </tr>`).join('');
  } catch (e) {
    cuerpo.innerHTML = '';
    mostrarError(document.querySelector('main'), e.message);
  }
})();
</script>
</body>
</html>
