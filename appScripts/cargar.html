<!DOCTYPE html>
<!-- ============================================================
     cargar.html — Formulario del cargador de cartillas
     En Apps Script: Archivo (+) → HTML → nombre EXACTO: "cargar"
     ============================================================ -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .dropzone {
      border: 2px dashed #adb5bd; border-radius: .75rem;
      padding: 2rem; text-align: center; cursor: pointer;
      transition: all .2s;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: #0d6efd; background: #eef4ff;
    }
    .dropzone .bi { font-size: 2rem; }
    #archivoNombre { word-break: break-all; }
  </style>
</head>
<body>
<div class="container py-3">

  <div class="card">
    <div class="card-body p-4">
      <h5 class="card-title mb-1">📤 Cargar cartilla Excel</h5>
      <p class="text-muted small mb-4">
        Versión navegador: sube la cartilla (.xlsx) con las predicciones marcadas con
        <span class="badge text-bg-secondary">x</span> en LOCAL / EMPATE / VISITA.
      </p>

      <!-- Nombre -->
      <div class="mb-3">
        <label for="nombre" class="form-label fw-semibold">Nombre del participante</label>
        <input type="text" class="form-control" id="nombre"
               placeholder="Ej: Ernesto Velásquez" maxlength="60" required>
        <div id="participantesHint" class="form-text d-none"></div>
      </div>

      <!-- Archivo -->
      <div class="mb-4">
        <label class="form-label fw-semibold">Archivo Excel</label>
        <div class="dropzone" id="dropzone">
          <div>🗂️</div>
          <div class="mt-1">Arrastra el .xlsx aquí o <span class="text-primary">haz clic para elegir</span></div>
          <div id="archivoNombre" class="small text-success fw-semibold mt-2"></div>
        </div>
        <input type="file" id="archivo" accept=".xlsx" class="d-none">
      </div>

      <!-- Botón -->
      <div class="d-grid">
        <button class="btn btn-primary btn-lg" id="btnSubir" onclick="subir()">
          <span id="btnTexto">Cargar cartilla</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
      </div>

      <!-- Resultado -->
      <div id="alerta" class="alert mt-4 d-none" role="alert"></div>
    </div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
let archivoSeleccionado = null;

/* ---------- dropzone ---------- */
const dz = $('dropzone');
dz.addEventListener('click', () => $('archivo').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  if (e.dataTransfer.files.length) seleccionarArchivo(e.dataTransfer.files[0]);
});
$('archivo').addEventListener('change', e => {
  if (e.target.files.length) seleccionarArchivo(e.target.files[0]);
});

function seleccionarArchivo(f) {
  if (!f.name.toLowerCase().endsWith('.xlsx')) {
    mostrarAlerta('danger', '⚠️ El archivo debe ser .xlsx');
    return;
  }
  if (f.size > 10 * 1024 * 1024) {
    mostrarAlerta('danger', '⚠️ El archivo supera los 10 MB.');
    return;
  }
  archivoSeleccionado = f;
  $('archivoNombre').textContent = '✓ ' + f.name + ' (' + (f.size/1024).toFixed(0) + ' KB)';
  ocultarAlerta();
}

/* ---------- subir ---------- */
function subir() {
  const nombre = $('nombre').value.trim();
  if (!nombre)            return mostrarAlerta('warning', 'Indica el nombre del participante.');
  if (!archivoSeleccionado) return mostrarAlerta('warning', 'Selecciona el archivo Excel.');

  bloquear(true);
  const lector = new FileReader();
  lector.onload = e => {
    try {
      const predicciones = extraerPrediccionesExcel(e.target.result);
      if (!predicciones.length) {
        bloquear(false);
        return mostrarAlerta('danger', '❌ No se encontraron predicciones en el Excel.');
      }
      google.script.run
        .withSuccessHandler(respuesta)
        .withFailureHandler(err => {
          bloquear(false);
          mostrarAlerta('danger', '❌ Error: ' + (err.message || err));
        })
        .procesarPredicciones(nombre, predicciones);
    } catch (err) {
      bloquear(false);
      mostrarAlerta('danger', '❌ ' + (err.message || err));
    }
  };
  lector.onerror = () => { bloquear(false); mostrarAlerta('danger', '❌ No se pudo leer el archivo.'); };
  lector.readAsArrayBuffer(archivoSeleccionado);
}

function extraerPrediccionesExcel(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
  const nombreHoja = wb.SheetNames.includes('Calendario Fase de Grupos Mundi')
    ? 'Calendario Fase de Grupos Mundi'
    : wb.SheetNames[0];
  const ws = wb.Sheets[nombreHoja];
  const datos = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  let filaHeader = -1;
  let colInicio = -1;
  for (let i = 0; i < Math.min(datos.length, 25); i++) {
    for (let j = 0; j < Math.min(datos[i].length, 5); j++) {
      if (String(datos[i][j]).trim().toLowerCase() === 'partido') {
        filaHeader = i;
        colInicio = j;
        break;
      }
    }
    if (filaHeader >= 0) break;
  }
  if (filaHeader < 0) throw new Error('No se encontró el encabezado "Partido".');

  const predicciones = [];
  for (let f = filaHeader + 1; f < datos.length; f++) {
    const fila = datos[f];
    const partido = Number(fila[colInicio]);
    if (!partido || Number.isNaN(partido)) continue;

    const marcaLocal = String(fila[colInicio + 6] || '').trim().toLowerCase();
    const marcaEmpate = String(fila[colInicio + 7] || '').trim().toLowerCase();
    const marcaVisita = String(fila[colInicio + 8] || '').trim().toLowerCase();
    let prediccion = '';
    if (marcaLocal === 'x') prediccion = 'LOCAL';
    else if (marcaEmpate === 'x') prediccion = 'EMPATE';
    else if (marcaVisita === 'x') prediccion = 'VISITA';

    predicciones.push({
      partido,
      grupo: String(fila[colInicio + 1] || '').replace(/^Grupo\s*/i, '').trim(),
      local: String(fila[colInicio + 2] || '').trim(),
      visita: String(fila[colInicio + 3] || '').trim(),
      prediccion
    });
  }
  return predicciones;
}

function respuesta(r) {
  bloquear(false);
  if (!r.ok) return mostrarAlerta('danger', '❌ ' + r.error);

  let msg = '✅ Cartilla de <b>' + r.participante + '</b> cargada: <b>' +
            r.cargadas + '</b> partidos.';
  if (r.reemplazo) msg += '<br>♻️ Se reemplazó una cartilla anterior del mismo nombre.';
  if (r.sinPrediccion && r.sinPrediccion.length) {
    msg += '<br>⚠️ Partidos sin predicción (' + r.sinPrediccion.length + '): ' +
           r.sinPrediccion.join(', ');
  }
  mostrarAlerta(r.sinPrediccion && r.sinPrediccion.length ? 'warning' : 'success', msg);

  // limpiar form para una siguiente carga
  $('nombre').value = '';
  archivoSeleccionado = null;
  $('archivoNombre').textContent = '';
  cargarParticipantes();
}

/* ---------- UI helpers ---------- */
function bloquear(b) {
  $('btnSubir').disabled = b;
  $('btnTexto').textContent = b ? 'Procesando…' : 'Cargar cartilla';
  $('btnSpinner').classList.toggle('d-none', !b);
}
function mostrarAlerta(tipo, html) {
  const a = $('alerta');
  a.className = 'alert mt-4 alert-' + tipo;
  a.innerHTML = html;
}
function ocultarAlerta() { $('alerta').classList.add('d-none'); }

/* ---------- participantes ya cargados ---------- */
function cargarParticipantes() {
  google.script.run.withSuccessHandler(lista => {
    if (!lista || !lista.length) return;
    const hint = $('participantesHint');
    hint.classList.remove('d-none');
    hint.textContent = 'Ya cargados: ' + lista.join(', ');
  }).listarParticipantes();
}
cargarParticipantes();
</script>
</body>
</html>
