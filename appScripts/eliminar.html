<!DOCTYPE html>
<!-- En Apps Script: Archivo (+) → HTML → nombre EXACTO: "eliminar" -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background:#f8f9fa; }</style>
</head>
<body>
<div class="container py-3">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h5 class="card-title">🗑️ Eliminar participante</h5>
      <p class="text-muted small">Se borrarán <b>todas</b> las filas de su cartilla. Esta acción no se puede deshacer.</p>

      <div class="mb-3">
        <label class="form-label fw-semibold" for="sel">Participante</label>
        <select class="form-select" id="sel" disabled>
          <option>Cargando…</option>
        </select>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="confirmo">
        <label class="form-check-label" for="confirmo">
          Confirmo que quiero eliminar esta cartilla definitivamente
        </label>
      </div>

      <div class="d-grid">
        <button class="btn btn-danger" id="btn" onclick="eliminar()" disabled>
          <span id="btnTexto">Eliminar</span>
          <span id="spin" class="spinner-border spinner-border-sm d-none"></span>
        </button>
      </div>

      <div id="alerta" class="alert mt-3 d-none"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

google.script.run.withSuccessHandler(lista => {
  if (!lista.length) {
    $('sel').innerHTML = '<option>No hay participantes</option>';
    return;
  }
  $('sel').innerHTML = '<option value="">— Selecciona —</option>' +
    lista.map(n => `<option>${n}</option>`).join('');
  $('sel').disabled = false;
}).listarParticipantes();

function validar() {
  $('btn').disabled = !($('sel').value && $('confirmo').checked);
}
$('sel').addEventListener('change', validar);
$('confirmo').addEventListener('change', validar);

function eliminar() {
  const eliminado = $('sel').value;
  bloquear(true);
  google.script.run
    .withSuccessHandler(r => {
      bloquear(false);
      if (!r.ok) return alerta('danger', '❌ ' + r.error);
      alerta('success', `✅ Participante <b>${eliminado}</b> eliminado (${r.eliminadas} filas).`);
      [...$('sel').options].forEach(o => { if (o.value === eliminado || o.textContent === eliminado) o.remove(); });
      $('sel').value = '';
      $('confirmo').checked = false;
      validar();
    })
    .withFailureHandler(e => { bloquear(false); alerta('danger', '❌ ' + e.message); })
    .eliminarParticipante($('sel').value);
}

function bloquear(b) {
  $('btn').disabled = b;
  $('btnTexto').textContent = b ? 'Eliminando…' : 'Eliminar';
  $('spin').classList.toggle('d-none', !b);
}
function alerta(tipo, html) {
  const a = $('alerta');
  a.className = 'alert mt-3 alert-' + tipo;
  a.innerHTML = html;
}
</script>
</body>
</html>
