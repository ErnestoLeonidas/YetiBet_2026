<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resultados · YetiBet 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Archivo+Black&display=swap" rel="stylesheet">
  <link href="app.css" rel="stylesheet">
</head>
<body>

<nav class="yeti-nav">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
    <a class="brand" href="index.html">YETIBET <span class="y26">2026</span></a>
    <div class="d-flex gap-3">
      <a class="nav-link" href="index.html">Inicio</a>
      <a class="nav-link" href="ranking.html">Ranking</a>
      <a class="nav-link" href="cartillas.html">Cartillas</a>
      <a class="nav-link active" href="resultados.html">Resultados</a>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h1 class="fs-2 mb-1">⚽ Resultados del Mundial</h1>
  <p class="text-secondary mb-4">Fase de grupos · México, Canadá y Estados Unidos 2026.</p>

  <div class="d-flex flex-wrap gap-2 mb-4" id="pills"></div>

  <div class="row g-3" id="lista">
    <div class="text-secondary">Cargando…</div>
  </div>
</main>

<footer class="pie container">YetiBet 2026 <span id="actualizado"></span></footer>

<script src="app.js"></script>
<script>
const GRUPOS = 'ABCDEFGHIJKL'.split('');
let DATOS = null;
let grupoActivo = 'A';

(async () => {
  try {
    DATOS = await cargarDatos();

    const pills = document.getElementById('pills');
    pills.innerHTML = GRUPOS.map(g =>
      `<button class="grupo-pill" data-g="${g}">${g}</button>`).join('');
    pills.addEventListener('click', e => {
      const g = e.target.dataset.g;
      if (g) seleccionar(g);
    });

    const param = new URLSearchParams(location.search).get('g');
    seleccionar(param && GRUPOS.includes(param.toUpperCase()) ? param.toUpperCase() : 'A');

    document.getElementById('actualizado').textContent =
      ' · datos: ' + fechaCorta(DATOS.actualizado);
  } catch (e) {
    mostrarError(document.getElementById('lista'), e.message);
  }
})();

function seleccionar(g) {
  grupoActivo = g;
  document.querySelectorAll('.grupo-pill').forEach(b =>
    b.classList.toggle('active', b.dataset.g === g));
  history.replaceState(null, '', 'resultados.html?g=' + g);
  pintar();
}

function pintar() {
  const lista = document.getElementById('lista');
  const partidos = DATOS.partidos
    .filter(p => String(p.grupo).toUpperCase() === grupoActivo)
    .sort((a, b) => a.partido - b.partido);

  if (!partidos.length) {
    lista.innerHTML = '<div class="text-secondary">No hay partidos para este grupo.</div>';
    return;
  }

  lista.innerHTML = partidos.map(p => {
    const finalizado = p.estado === 'FINALIZADO';
    const marcador = finalizado
      ? `<div class="marcador num">${p.golesLocal} – ${p.golesVisita}</div>`
      : `<div class="marcador pendiente">${fechaCorta(p.fecha)}</div>`;
    return `
      <div class="col-md-6">
        <div class="card-yeti">
          <div class="partido">
            <div class="equipo">${imgBandera(p.banderaLocal, p.local)}<span>${p.local}</span></div>
            ${marcador}
            <div class="equipo visita"><span>${p.visita}</span>${imgBandera(p.banderaVisita, p.visita)}</div>
          </div>
          <div class="text-center small text-secondary pb-2">
            Partido ${p.partido}${finalizado ? '' : ' · por jugar'}
          </div>
        </div>
      </div>`;
  }).join('');
}
</script>
</body>
</html>
